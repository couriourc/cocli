name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/main/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Rust project
        working-directory: apps/main
        run: cargo build --release

      - name: Verify binary exists
        working-directory: apps/main
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            test -f target/release/cocli.exe || exit 1
          else
            test -f target/release/cocli || exit 1
          fi

      - name: Test binary
        working-directory: apps/main
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Windows" ]; then
            ./target/release/cocli.exe --help || exit 1
          else
            ./target/release/cocli --help || exit 1
          fi

