name: Release

on:
  push:
    tags:
      - 'v*'  # 匹配所有以 v 开头的 tag，例如 v0.1.0

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify installation
        working-directory: apps/main
        run: |
          node src/index.js --version || echo "Version check completed"

      - name: Extract version from tag
        id: tag_version
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.tag_version.outputs.tag }}
          body: |
            ## CoCli ${{ steps.tag_version.outputs.version }}

            ### 安装方式

            推荐使用以下方式安装（会自动从 `apps/main/` 目录安装 Node.js 包）：

            ```bash
            # 使用 npm
            npm install -g git+https://github.com/${{ github.repository }}.git#${{ steps.tag_version.outputs.tag }}

            # 使用 pnpm（推荐）
            pnpm add -g git+https://github.com/${{ github.repository }}.git#${{ steps.tag_version.outputs.tag }}

            # 使用 yarn
            yarn global add git+https://github.com/${{ github.repository }}.git#${{ steps.tag_version.outputs.tag }}
            ```

            **注意**: 从 Git 安装需要系统安装 Node.js 18+ 和 pnpm/npm/yarn。

            ### 从源码运行

            如果你想从源码运行：

            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd cocli
            pnpm install
            cd apps/main
            node src/index.js --help
            ```

            ### 系统要求

            - Node.js 18 或更高版本
            - pnpm 10.15.0+（推荐）或 npm/yarn
          draft: false
          prerelease: false
