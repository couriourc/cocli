name: Release

on:
  push:
    tags:
      - 'v*'  # 匹配所有以 v 开头的 tag，例如 v0.1.0

jobs:
  build:
    name: Build for ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            artifact_name: cocli-linux-x86_64
          - os: ubuntu-latest
            arch: aarch64
            target: aarch64-unknown-linux-gnu
            artifact_name: cocli-linux-aarch64
          - os: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
            artifact_name: cocli-macos-x86_64
          - os: macos-latest
            arch: arm64
            target: aarch64-apple-darwin
            artifact_name: cocli-macos-arm64
          - os: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
            artifact_name: cocli-windows-x86_64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for cross-compilation)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            apps/main/target/
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('apps/main/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build binary (using cross for ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        working-directory: apps/main
        run: |
          cross build --release --target ${{ matrix.target }}

      - name: Build binary (native)
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        working-directory: apps/main
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact
        working-directory: apps/main
        shell: bash
        run: |
          mkdir -p release-artifact
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp target/${{ matrix.target }}/release/cocli.exe release-artifact/${{ matrix.artifact_name }}
          else
            cp target/${{ matrix.target }}/release/cocli release-artifact/${{ matrix.artifact_name }}
            chmod +x release-artifact/${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: apps/main/release-artifact/${{ matrix.artifact_name }}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          cd release-artifacts
          # 为每个平台创建压缩包
          for artifact_dir in */; do
            if [ -d "$artifact_dir" ]; then
              platform=$(basename "$artifact_dir")
              cd "$artifact_dir"
              # 查找二进制文件
              for file in *; do
                if [ -f "$file" ]; then
                  if [[ "$file" == *".exe" ]]; then
                    # Windows: 创建 zip
                    zip "../${platform}.zip" "$file"
                  else
                    # Unix: 创建 tar.gz
                    tar -czf "../${platform}.tar.gz" "$file"
                  fi
                fi
              done
              cd ..
            elif [ -f "$artifact_dir" ]; then
              # 处理直接是文件的情况（某些情况下 artifact 可能是文件而不是目录）
              file="$artifact_dir"
              platform="${file%.*}"
              if [[ "$file" == *".exe" ]]; then
                zip "${platform}.zip" "$file"
              else
                tar -czf "${platform}.tar.gz" "$file"
              fi
            fi
          done
          # 移动所有压缩包到根目录
          find . -name "*.zip" -o -name "*.tar.gz" | while read f; do
            if [ "$(dirname "$f")" != "." ]; then
              mv "$f" .
            fi
          done
          cd ..

      - name: Extract version from tag
        id: tag_version
        shell: bash
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ steps.tag_version.outputs.tag }}
          body: |
            ## CoCli ${{ steps.tag_version.outputs.version }}

            ### 安装方式

            推荐使用以下方式安装（会自动从 `apps/main/` 目录构建）：

            ```bash
            # 使用 npm
            npm install -g git+https://github.com/${{ github.repository }}.git#${{ steps.tag_version.outputs.tag }}

            # 使用 pnpm
            pnpm add -g git+https://github.com/${{ github.repository }}.git#${{ steps.tag_version.outputs.tag }}
            ```

            **注意**: 从 Git 安装会自动在 `apps/main/` 目录下运行构建，需要系统安装 Rust 和 Cargo。

            ### 预构建二进制文件

            如果不想从源码构建，可以从下方下载对应平台的预构建二进制文件：

            - Linux (x86_64): `cocli-linux-x86_64.tar.gz`
            - Linux (ARM64): `cocli-linux-aarch64.tar.gz`
            - macOS (Intel): `cocli-macos-x86_64.tar.gz`
            - macOS (Apple Silicon): `cocli-macos-arm64.tar.gz`
            - Windows (x86_64): `cocli-windows-x86_64.zip`

            下载后解压并将二进制文件添加到 PATH 环境变量中即可使用。
          files: |
            release-artifacts/*.zip
            release-artifacts/*.tar.gz
          draft: false
          prerelease: false
